<h2>{{ 'Events' | transloco }}</h2>

<div class="container">
  <div class="row">
    <h3 class="col-12" id="ex-8" [innerHTML]="'List events' | transloco"></h3>
    <div class="container">
      <div class="row">
        <div class="col-6">
          <ng-select2
            [overlay]="overlay"
            [styleMode]="styleMode"
            [data]="data8"
            [value]="value8"
            autoCreate
            (update)="update('update', $event)"
            (blur)="blur('blur', $event)"
            (focus)="focus('focus', $event)"
            (open)="open('open', $event)"
            (close)="close('close', $event)"
            (search)="search('search', $event)"
            (autoCreateItem)="autoCreate('autoCreateItem', $event)"
            id="select2-8"
          />

          <div class="value">
            <div>
              <span>{{ 'value:' | transloco }}</span
              ><code>{{ value8 | json }}</code>
            </div>
          </div>
        </div>

        <div class="col-6">
          <div class="code">
            <code><pre [highlight]="exemple8()" language="html"></pre></code>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button (click)="event = []">{{ 'Clear events' | transloco }}</button>
  <div class="events">
    <h4>{{ 'Events:' | transloco }}</h4>
    @for (item of event; track item) {
      <code>
        <div>{{ item.key }} - {{ item.type }}</div>
        <pre>{{ item.event | json }}</pre>
      </code>
    }
  </div>
</div>
